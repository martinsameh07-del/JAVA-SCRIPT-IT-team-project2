<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mini Projects Website</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#071326;
      color:white;
      overflow-x:hidden;
    }

    header{
      width:100%;
      padding:20px;
      background:#0b1d38;
      display:flex;
      justify-content:space-between;
      align-items:center;
      border-bottom:2px solid #1c355e;
      position:sticky;
      top:0;
      z-index:1000;
    }

    header h1{
      font-size:28px;
    }

    nav{
      display:flex;
      gap:15px;
      flex-wrap:wrap;
    }

    nav button{
      padding:10px 18px;
      border:none;
      border-radius:10px;
      background:#132b4f;
      color:white;
      cursor:pointer;
      transition:0.3s;
      font-size:15px;
    }

    nav button:hover{
      background:#1e4b8f;
      transform:scale(1.05);
    }

    .page{
      display:none;
      min-height:100vh;
      padding:40px;
      animation:fade 0.4s ease;
    }

    .active{
      display:block;
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(10px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .title{
      font-size:40px;
      margin-bottom:30px;
      text-align:center;
    }

    /* ================= COLOR PALETTE ================= */

    .palette-container{
      display:flex;
      gap:20px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .color-box{
      width:180px;
      height:220px;
      border-radius:15px;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      padding:15px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
      border:3px solid rgba(255,255,255,0.2);
    }

    .color-box:hover{
      transform:translateY(-8px);
    }

    .generate-btn{
      display:block;
      margin:30px auto;
      padding:15px 30px;
      border:none;
      border-radius:12px;
      background:#1d72ff;
      color:white;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
    }

    .generate-btn:hover{
      background:#428cff;
    }

    /* ================= TABLE ================= */

    .table-wrapper{
      overflow-x:auto;
      margin-top:30px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      background:#0f223d;
      border-radius:15px;
      overflow:hidden;
    }

    th, td{
      padding:18px;
      text-align:center;
      border:1px solid #1d4b77;
    }

    th{
      background:#12345c;
    }

    tr:hover{
      background:#17385e;
    }

    .status-active{
      color:#00ff88;
      font-weight:bold;
    }

    .status-pending{
      color:#ffd900;
      font-weight:bold;
    }

    .status-inactive{
      color:#ff4d88;
      font-weight:bold;
    }

    /* ================= MODAL ================= */

    .open-modal-btn{
      padding:18px 35px;
      font-size:20px;
      border:none;
      border-radius:12px;
      background:#1d72ff;
      color:white;
      cursor:pointer;
      transition:0.3s;
    }

    .open-modal-btn:hover{
      background:#428cff;
    }

    .modal-overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.7);
      display:none;
      justify-content:center;
      align-items:center;
      z-index:9999;
    }

    .modal{
      background:white;
      color:black;
      width:420px;
      max-width:90%;
      padding:25px;
      border-radius:18px;
      animation:popup 0.3s ease;
    }

    @keyframes popup{
      from{
        transform:scale(0.7);
        opacity:0;
      }
      to{
        transform:scale(1);
        opacity:1;
      }
    }

    .modal h2{
      margin-bottom:15px;
    }

    .modal p{
      margin-bottom:25px;
      line-height:1.6;
    }

    .modal-buttons{
      display:flex;
      gap:10px;
    }

    .modal-buttons button{
      padding:10px 18px;
      border:none;
      border-radius:10px;
      cursor:pointer;
    }

    .confirm{
      background:#1d72ff;
      color:white;
    }

    .cancel{
      background:#ddd;
    }

    .center{
      display:flex;
      justify-content:center;
      align-items:center;
      height:70vh;
      flex-direction:column;
      gap:25px;
    }

    footer{
      text-align:center;
      padding:20px;
      background:#08111f;
      color:#9fb5d3;
      margin-top:30px;
    }

  </style>
</head>

<body>

  <header>
    <h1>Mini Projects Website</h1>

    <nav>
      <button onclick="showPage('palette')">Color Palette</button>
      <button onclick="showPage('table')">Table Generator</button>
      <button onclick="showPage('modalPage')">Modal Popup</button>
    </nav>
  </header>

  <!-- ================= COLOR PALETTE PAGE ================= -->

  <section id="palette" class="page active">

    <h1 class="title">Mini Project 2 : Color Palette Generator</h1>

    <div class="palette-container" id="paletteContainer"></div>

    <button class="generate-btn" onclick="generatePalette()">
      Generate New Colors
    </button>

  </section>

  <!-- ================= TABLE PAGE ================= -->

  <section id="table" class="page">

    <h1 class="title">Mini Project 3 : Table Generator</h1>

    <div class="table-wrapper">

      <table>

        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Role</th>
            <th>Status</th>
          </tr>
        </thead>

        <tbody id="tableBody"></tbody>

      </table>

    </div>

  </section>

  <!-- ================= MODAL PAGE ================= -->

  <section id="modalPage" class="page">

    <h1 class="title">Mini Project 4 : Modal / Popup</h1>

    <div class="center">

      <button class="open-modal-btn" onclick="openModal()">
        Open Modal
      </button>

    </div>

  </section>

  <!-- ================= MODAL ================= -->

  <div class="modal-overlay" id="modalOverlay">

    <div class="modal">

      <h2>Modal Title</h2>

      <p>
        This is the modal content. 
        You can add forms, images, buttons, or any HTML content here.
      </p>

      <div class="modal-buttons">
        <button class="confirm">Confirm</button>
        <button class="cancel" onclick="closeModal()">Cancel</button>
      </div>

    </div>

  </div>

  <footer>
    Made By Kero 😎
  </footer>

  <script>

    /* ================= PAGE NAVIGATION ================= */

    function showPage(id){

      let pages = document.querySelectorAll(".page");

      pages.forEach(page=>{
        page.classList.remove("active");
      });

      document.getElementById(id).classList.add("active");
    }

    /* ================= COLOR PALETTE ================= */

    const paletteContainer = document.getElementById("paletteContainer");

    function randomColor(){

      const letters = "0123456789ABCDEF";

      let color = "#";

      for(let i=0;i<6;i++){
        color += letters[Math.floor(Math.random()*16)];
      }

      return color;
    }

    function generatePalette(){

      paletteContainer.innerHTML = "";

      for(let i=0;i<5;i++){

        let color = randomColor();

        let box = document.createElement("div");

        box.className = "color-box";

        box.style.background = color;

        box.innerHTML = color;

        box.addEventListener("click", ()=>{

          navigator.clipboard.writeText(color);

          alert(color + " copied!");
        });

        paletteContainer.appendChild(box);
      }
    }

    generatePalette();

    /* ================= TABLE GENERATOR ================= */

    const data = [

      [1 , "martin" , "Developer" , "Active"],
      [2 , "kero" , "Designer" , "Pending"],
      [3 , "abdo" , "Manager" , "Active"],
      [4 , "...." , "QA Engineer" , "Inactive"]

    ];

    const tableBody = document.getElementById("tableBody");

    data.forEach(rowData=>{

      let row = document.createElement("tr");

      rowData.forEach((cellData,index)=>{

        let cell = document.createElement("td");

        cell.textContent = cellData;

        if(index === 3){

          if(cellData === "Active"){
            cell.classList.add("status-active");
          }

          else if(cellData === "Pending"){
            cell.classList.add("status-pending");
          }

          else{
            cell.classList.add("status-inactive");
          }

        }

        row.appendChild(cell);
      });

      tableBody.appendChild(row);

    });

    /* ================= MODAL ================= */

    const modalOverlay = document.getElementById("modalOverlay");

    function openModal(){
      modalOverlay.style.display = "flex";
    }

    function closeModal(){
      modalOverlay.style.display = "none";
    }

    modalOverlay.addEventListener("click",(e)=>{

      if(e.target === modalOverlay){
        closeModal();
      }

    });

  </script>

</body>
</html>
